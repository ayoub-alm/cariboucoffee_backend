version: '3.8'

services:
  db:
    image: postgres:15
    volumes:
      # Persist PostgreSQL data to local machine at ./data/postgres
      - ./data/postgres:/var/lib/postgresql/data/
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=YOUR_NEW_SECURE_PASSWORD
      - POSTGRES_DB=caribou
    # Removed public port mapping to prevent external attacks

  web:
    build: .
    command: bash start.sh
    volumes:
      - .:/app
      # Persist uploaded images to local machine at ./data/uploads
      - ./data/uploads:/app/app/static/uploads
    ports:
      - "0.0.0.0:8008:8000"
    environment:
      - POSTGRES_SERVER=db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=YOUR_NEW_SECURE_PASSWORD
      - POSTGRES_DB=caribou
      - POSTGRES_PORT=5432
    depends_on:
      - db
